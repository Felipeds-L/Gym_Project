version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gym_app_db
    restart: always
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: gym_app
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: